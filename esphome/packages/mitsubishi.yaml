# Define the physical UART bus
uart:
  id: hp_uart
  tx_pin: GPIO43 # Physical Pin D6
  rx_pin: GPIO44 # Physical Pin D7 (1k resistor goes here!)
  baud_rate: 2400
  stop_bits: 1
  data_bits: 8
  parity: NONE

# Define the Climate Entity
climate:
  - platform: cn105
    id: hp
    name: "${friendly_name}"
    uart_id: hp_uart
    # The echavet library handles vanes automatically
    update_interval: 10s

# Sensor to track the specific HVAC action (Heating, Cooling, Idle)
sensor:
  - platform: template
    name: "${friendly_name} Operating State"
    lambda: |-
      return id(hp).action;
    update_interval: 10s
